- pipeline: deploy
  name: Deploy
  refs:
  - refs/heads/main
  fail_on_prepare_env_warning: true
  events:
  - type: WEBHOOK
  actions:
  - action: flutter build apk
    type: BUILD
    execute_commands:
    - "#Install Android SDK & Flutter 3.41.2"
    - ""
    - "#Buddy"
    - export ANDROID_HOME="/opt/android/sdk/"
    - export FLUTTER_HOME="/opt/flutter"
    - export FLUTTER_ROOT="$FLUTTER_HOME"
    - export FLUTTER_VERSION="3.41.2"
    - "export PATH=$PATH:/opt/android/sdk/cmdline-tools/tools/bin:${FLUTTER_HOME}/bin:${FLUTTER_HOME}/bin/cache/dart-sdk/bin"
    - "if [ ! -d \"$ANDROID_HOME/cmdline-tools\" ]; then"
    - ' curl -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip'
    - ' unzip sdk.zip'
    - ' rm sdk.zip'
    - ' mkdir "$ANDROID_HOME/cmdline-tools"'
    - ' mv cmdline-tools "$ANDROID_HOME/cmdline-tools/tools"'
    - ' yes | "$ANDROID_HOME/cmdline-tools/tools/bin/sdkmanager" --licenses'
    - fi
    - "#Buddy"
    - ""
    - flutter build apk
    setup_commands:
    - apt-get update && apt-get install -y xz-utils git unzip curl && cd /opt && curl -o flutter.tar.xz https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.2-stable.tar.xz && tar -xf flutter.tar.xz && rm flutter.tar.xz && git config --global --add safe.directory /opt/flutter
    - /opt/flutter/bin/flutter doctor > /dev/null
    cached_dirs:
    - /root/.gradle
    - /opt/android/sdk
    shell: BASH
    docker_image_name: library/eclipse-temurin
    docker_image_tag: 25
  - action: flutter build ios --release
    type: NATIVE_BUILD_MAC_FLUTTER
    commands:
    - flutter build ios --release
    shell: BASH
    xcode_version: 26.2.0
    flutter_version: 3.38.7
