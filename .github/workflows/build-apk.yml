name: Build Rytham APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Android Project
        run: |
          flutter create --project-name rytham --org com.satheesh.rytham . --platforms android
          echo "✅ Android folder created"

      - name: Set minSdkVersion to 21
        run: |
          # Handle both Groovy and Kotlin DSL build files
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' android/app/build.gradle
            echo "✅ Updated build.gradle (Groovy)"
            grep minSdkVersion android/app/build.gradle
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = [0-9]*/minSdk = 21/' android/app/build.gradle.kts
            echo "✅ Updated build.gradle.kts (Kotlin DSL)"
            grep minSdk android/app/build.gradle.kts
          fi

      - name: Add Storage Permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>' "$MANIFEST"
          echo "✅ Permissions added"
          cat "$MANIFEST"

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rytham-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Rytham v1.0.${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
