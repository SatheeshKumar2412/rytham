name: Build Rytham APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Scaffold Android folder from template
        run: |
          flutter create --project-name rytham --org com.satheesh.rytham /tmp/rytham_template --platforms android
          cp -r /tmp/rytham_template/android ./android

      - name: Patch AndroidManifest for on_audio_query
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add permissions before <application tag
          sed -i 's|<application|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32"/>
    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
    <uses-permission android:name="android.permission.INTERNET"/>
    <application|' "$MANIFEST"
          cat "$MANIFEST"

      - name: Patch build.gradle for minSdkVersion
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 21/' "$GRADLE"
          cat "$GRADLE"

      - name: Get Flutter Dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --verbose 2>&1 | tail -50

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rytham-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Rytham v1.0.${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
