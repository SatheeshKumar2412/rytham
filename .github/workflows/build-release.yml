name: "Build & Release Rytham"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: "stable"
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Extract Version
        run: |
          VERSION=$(grep -E "^version:" pubspec.yaml | awk "{print \$2}" | cut -d"+" -f1)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build APK (split per ABI + universal)
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }} --verbose

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk                 rytham_v${{ env.VERSION }}_universal.apk     2>/dev/null || true
          mv app-arm64-v8a-release.apk       rytham_v${{ env.VERSION }}_arm64-v8a.apk     2>/dev/null || true
          mv app-armeabi-v7a-release.apk     rytham_v${{ env.VERSION }}_armeabi-v7a.apk   2>/dev/null || true
          mv app-x86_64-release.apk          rytham_v${{ env.VERSION }}_x86_64.apk        2>/dev/null || true

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rytham-apks-v${{ env.VERSION }}
          path: build/app/outputs/flutter-apk/rytham_*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/rytham_*.apk"
          tag: v${{ env.VERSION }}+${{ github.run_number }}
          name: "Rytham v${{ env.VERSION }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          allowUpdates: true