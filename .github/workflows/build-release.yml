name: "Build & Release Rytham"

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: "stable"
          cache: true

      - name: Create local.properties
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APKs (split per ABI + universal)
        run: flutter build apk --release --split-per-abi --build-number ${{ github.run_number }}

      - name: Rename APKs
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk            build/app/outputs/flutter-apk/rytham-v1.0.0-universal.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  build/app/outputs/flutter-apk/rytham-v1.0.0-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/rytham-v1.0.0-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk     build/app/outputs/flutter-apk/rytham-v1.0.0-x86_64.apk

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rytham-apks
          path: build/app/outputs/flutter-apk/rytham-*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/rytham-*.apk"
          tag: v1.0.0+${{ github.run_number }}
          name: "Rytham v1.0.0 (Build ${{ github.run_number }})"
          prerelease: false
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}